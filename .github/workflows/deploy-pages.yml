name: Publish Pages

on:
  push:
    branches:
      - main
    paths:
      - data/data.json
      - site/**
      - scripts/build-site.mjs
      - package-lock.json
      - package.json
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install deps (none required)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          fi

      - name: Build static site
        run: node scripts/build-site.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy_second.outputs.page_url || steps.deploy_first.outputs.page_url }}
    steps:
      - name: Deploy attempt 1
        id: deploy_first
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy attempt 2
        id: deploy_second
        if: steps.deploy_first.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Record publishing failure
        if: steps.deploy_first.outcome == 'failure' && steps.deploy_second.outcome == 'failure'
        run: |
          echo "::error::Publishing failed after two deploy attempts. Uptime data collection completed in the monitor workflow."
          exit 1
