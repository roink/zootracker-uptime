name: Uptime monitor

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uptime-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Optional: cache npm to keep installs fast (evicts if not hit for 7 days)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install deps (none required)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          fi

      - name: Run check + build data
        run: node scripts/check.mjs

      - name: Commit updated history + site data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- data/checks.json data/data.json)" ]; then
            echo "No changes"
            exit 0
          fi
          git add data/checks.json data/data.json
          git commit -m "chore: record uptime [skip ci]"
          git push
